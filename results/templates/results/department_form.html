{% extends 'results/base.html' %}
{% block title %}{{ action }} Department – SRMS{% endblock %}
{% block page_title %}{{ action }} Department{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h5 class="fw-bold mb-0">{{ action }} Department</h5>
      <a href="{% url 'department_list' %}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Back
      </a>
    </div>
    <div class="form-card">
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold small">Department Name *</label>
          {{ form.name }}
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold small">Department Code *</label>
          {{ form.code }}
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary px-4">
            <i class="bi bi-check-lg me-1"></i>Save
          </button>
          <a href="{% url 'department_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
