{% extends 'results/base.html' %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center" style="background: linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
          <div class="d-inline-flex align-items-center justify-content-center rounded-3 mb-3"
               style="width:64px;height:64px;background:#4361ee;font-size:32px;color:#fff;">
            <i class="bi bi-mortarboard-fill"></i>
          </div>
          <h4 class="text-white fw-bold mb-1">SRMS</h4>
          <p class="text-muted small">Student Result Management System</p>
        </div>
        <div class="card border-0 shadow-lg" style="border-radius:16px;">
          <div class="card-body p-4">
            <h5 class="fw-bold mb-4 text-center">Sign In</h5>
            {% if messages %}
              {% for msg in messages %}
                <div class="alert alert-danger py-2 small">{{ msg }}</div>
              {% endfor %}
            {% endif %}
            <form method="post">
              {% csrf_token %}
              <div class="mb-3">
                <label class="form-label fw-semibold small">Username</label>
                {{ form.username }}
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold small">Password</label>
                {{ form.password }}
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" style="background:#4361ee;border-color:#4361ee;">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login
              </button>
            </form>
          </div>
        </div>
        <p class="text-center text-muted small mt-3">
          &copy; 2025 Swizosoft (OPC) Pvt Ltd
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
