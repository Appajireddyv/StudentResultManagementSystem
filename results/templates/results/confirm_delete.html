{% extends 'results/base.html' %}
{% block title %}Delete {{ type }} – SRMS{% endblock %}
{% block page_title %}Delete {{ type }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="form-card text-center">
      <div class="mb-3" style="font-size:56px;color:#dc3545;">
        <i class="bi bi-exclamation-triangle-fill"></i>
      </div>
      <h5 class="fw-bold mb-2">Confirm Deletion</h5>
      <p class="text-muted mb-4">
        Are you sure you want to delete <strong>{{ object }}</strong>?
        This action <strong>cannot be undone</strong>.
      </p>
      <form method="post" class="d-flex justify-content-center gap-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-4">
          <i class="bi bi-trash me-1"></i>Yes, Delete
        </button>
        <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
